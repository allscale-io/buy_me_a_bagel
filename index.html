<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Me a Bagel</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="profile">
        <div class="avatar" id="avatar">
          <span class="default-icon">🥯</span>
        </div>
        <h1 id="display-name">Buy Me a Bagel</h1>
        <p id="bio"></p>
        <span class="chain-badge" id="chain-badge"></span>
      </div>

      <div id="checkout-form">
        <div class="section-label">Pick a bagel</div>
        <div class="presets" id="presets"></div>

        <div class="custom-amount" id="custom-amount-section">
          <div class="input-wrapper">
            <span class="currency">$</span>
            <input type="number" id="custom-amount" placeholder="Custom amount" min="1" step="1">
          </div>
        </div>

        <div class="message-input">
          <textarea id="message" placeholder="Say something nice (optional)" rows="2"></textarea>
        </div>

        <button class="checkout-btn" id="checkout-btn" disabled>
          <span class="bagel-icon">🥯</span>
          <span id="btn-text">Buy a Bagel</span>
        </button>

        <p class="non-custodial-note">
          Non-custodial &middot; Settled in <span id="stablecoin-label">USDT</span> &middot; Straight to wallet
        </p>
      </div>

      <div id="status-view" class="status-view" style="display: none;">
        <span id="status-icon" class="status-icon">🥯</span>
        <p id="status-text" class="status-text">Waiting for payment...</p>
        <p id="status-sub" class="status-sub">Complete the payment in the other tab</p>
        <button id="reset-btn" class="reset-btn" style="display: none;">Buy another bagel</button>
      </div>
    </div>

    <a class="github-link" href="https://github.com/allscale-io/buy_me_a_bagel" target="_blank" rel="noopener">
      <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      Fork on GitHub
    </a>

    <div class="powered-by">
      Powered by <a href="https://allscale.io" target="_blank" rel="noopener">Allscale Checkout</a>
    </div>

    <div class="socials" id="socials"></div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
